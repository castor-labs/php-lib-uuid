name: "Continuous Integration"

on:
  push:
    branches: ["main"]

  pull_request:
    branches: ["main"]

jobs:
  checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: "actions/checkout@v7"
      - name: "Install PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          coverage: "xdebug"
          extensions: "bcmath"
          php-version: "8.3"
          ini-values: memory_limit=-1
          tools: composer:v2
      - name: "Determine Composer Cache Dir"
        id: composer-cache
        run: |
          echo "dir=$(composer -q config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: "Cache Dependencies"
        uses: "actions/cache@v6"
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: "composer-8.3-checks-${{ hashFiles('composer.lock') }}"
          restore-keys: "composer-8.3-checks-"
      - name: "Install Dependencies"
        run: "composer install --ansi --no-interaction --no-progress"
      - name: "Check Rector"
        run: composer rector:check
      - name: "Check code style"
        run: composer mago:fmt:check
      - name: "Lint"
        run: composer mago:lint
      - name: "Analyse"
        run: composer mago:analyze

  test:
    name: Test PHP ${{ matrix.php-version }} (${{ matrix.deps }})
    runs-on: ubuntu-latest
    needs: ["checks"]
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.3", "8.4"]
        deps: ["lock", "highest", "lowest"]
    steps:
      - name: "Checkout Code"
        uses: "actions/checkout@v7"
      - name: "Install PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          coverage: "xdebug"
          extensions: "bcmath"
          php-version: ${{ matrix.php-version }}
          ini-values: memory_limit=-1
          tools: composer:v2
      - name: "Determine Composer Cache Dir"
        id: composer-cache
        run: |
          echo "dir=$(composer -q config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: "Cache Dependencies"
        uses: "actions/cache@v6"
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: "composer-${{ matrix.php-version }}-${{ matrix.deps }}-${{ hashFiles('composer.lock') }}"
          restore-keys: "composer-${{ matrix.php-version }}-${{ matrix.deps }}-"
      - name: "Install Dependencies"
        if: ${{ matrix.deps == 'lock' }}
        run: "composer install --ansi --no-interaction --no-progress"
      - name: "Install Highest Dependencies"
        if: ${{ matrix.deps == 'highest' }}
        run: "composer update --ansi --no-interaction --no-progress"
      - name: "Install Lowest Dependencies"
        if: ${{ matrix.deps == 'lowest' }}
        run: "composer update --prefer-lowest --ansi --no-interaction --no-progress"
      - name: "Run Test Suite"
        run: composer test
      - name: "Upload Coverage Report"
        uses: actions/upload-artifact@v7
        with:
          name: "coverage-report-${{ matrix.php-version }}-${{ matrix.deps }}"
          path: .dev/coverage
